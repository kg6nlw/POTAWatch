name: POTA Discord Alerts

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python pota_discord_alerts.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Save seen spots
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add seen_spots.json || true
          git commit -m "Update seen spots" || echo "No changes"
          git push || true
